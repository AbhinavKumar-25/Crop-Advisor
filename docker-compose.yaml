version: "3.9"

services:

  backend:
    build: ./my_backend
    container_name: crop_backend
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: crop_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend