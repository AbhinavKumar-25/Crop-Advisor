name: Infra Provision (Terraform)

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout repo
    - name: Checkout
      uses: actions/checkout@v3

    # 2️⃣ Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3️⃣ Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    # 4️⃣ Terraform Init
    - name: Terraform Init
      run: |
        cd terraform
        terraform init

    # 5️⃣ Terraform Plan
    - name: Terraform Plan
      run: |
        cd terraform
        terraform plan -var="key_name=${{ secrets.KEY_NAME }}"

    # 6️⃣ Terraform Apply
    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve \
        -var="key_name=${{ secrets.KEY_NAME }}"

    # 7️⃣ Print EC2 IP (for logs)
    - name: Print EC2 Public IP
      run: |
        cd terraform
        echo "EC2 Public IP: $(terraform output -raw ec2_public_ip)"